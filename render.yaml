services:
  - type: web
    name: format-tool-backend
    runtime: node
    rootDir: server
    buildCommand: npm install && pip3 install -r requirements.txt
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHON_CMD
        value: python3
      - key: FORMAT_TIMEOUT_MS
        value: 600000

  - type: web
    name: format-tool-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: FORMAT_TIMEOUT_MS
        value: 600000
        