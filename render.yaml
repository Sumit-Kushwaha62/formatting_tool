services:
  - type: web
    name: format-tool-backend
    runtime: node
    rootDir: server
    buildCommand: pip install -r requirements.txt && npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000

  - type: web
    name: format-tool-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist